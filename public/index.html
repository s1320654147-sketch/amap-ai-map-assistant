<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>高德 AI 地图助手</title>
    <link rel="stylesheet" href="/styles.css?v=20260630-keyboard" />
  </head>
  <body>
    <main class="main-dashboard-layout">
      <section class="left-side-panel chat-column">
        <nav class="rail" aria-label="主导航">
          <div class="rail-logo">AI</div>
          <button class="rail-item active is-active" id="conversationRailTab" type="button" data-view="chat"><span>⌁</span><em>对话</em></button>
          <button class="rail-item" id="searchRailTab" type="button" data-view="search"><span>◌</span><em>搜索</em></button>
          <button class="rail-item" id="favoritesRailTab" type="button" data-view="favorites"><span>☆</span><em>收藏</em></button>
          <button class="rail-item is-disabled" type="button" disabled title="即将上线"><span>▣</span><em>分析</em></button>
          <button class="rail-item is-disabled" type="button" disabled title="即将上线"><span>⚙</span><em>设置</em></button>
          <div class="rail-spacer"></div>
          <button class="profile-dot" type="button" aria-label="个人中心"></button>
        </nav>

        <div class="left-panel-content">
          <header class="chat-header">
            <div class="chat-header-main">
              <div class="brand-joint-badge">
                <div class="brand-item ds-brand">
                  <img class="brand-icon brand-icon-deepseek" src="/assets/deepseek-logo.png" alt="" aria-hidden="true" />
                  <span>DeepSeek</span>
                </div>
                <div class="brand-divider"></div>
                <div class="brand-item amap-brand">
                  <img class="brand-icon brand-icon-amap" src="/assets/amap-logo.png" alt="" aria-hidden="true" />
                  <span>高德地图</span>
                </div>
              </div>
              <span class="header-inline-title">AI 地图助手</span>
            </div>
          </header>

          <section class="ask-card input-card-container" id="heroAskCard">
            <span class="engine-powered-tag">⚡ DeepSeek 模型驱动 ｜ 📍 高德数据实况</span>
            <form id="agentForm" class="ask-form">
              <textarea
                id="questionInput"
                name="question"
                rows="2"
                placeholder="输入你的地点问题，或用自然语言描述需求"
              ></textarea>
              <button class="inspire-fab" id="inspireButton" type="button" aria-label="获取提问灵感" title="获取提问灵感" data-target="questionInput">
                <svg class="inspire-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 3 13.9 8.1 19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9Z" />
                  <path d="M18 3 18.8 5.2 21 6l-2.2.8L18 9l-.8-2.2L15 6l2.2-.8Z" />
                </svg>
              </button>
              <button class="voice-fab" id="voiceInputButton" type="button" aria-label="语音输入" title="语音输入" data-target="questionInput" hidden>
                <svg class="voice-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 15a3.5 3.5 0 0 0 3.5-3.5v-4a3.5 3.5 0 1 0-7 0v4A3.5 3.5 0 0 0 12 15Z" />
                  <path d="M6.5 11.5a5.5 5.5 0 0 0 11 0" />
                  <path d="M12 17v3" />
                  <path d="M9 20h6" />
                </svg>
              </button>
              <button class="send-fab" type="submit" aria-label="发送">➤</button>
            </form>
            <button class="mobile-voice-cta" id="mobileVoiceButton" type="button" aria-label="点击开始语音" title="点击开始语音" data-target="questionInput" hidden>
              <svg class="voice-icon mobile-voice-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 15a3.5 3.5 0 0 0 3.5-3.5v-4a3.5 3.5 0 1 0-7 0v4A3.5 3.5 0 0 0 12 15Z" />
                <path d="M6.5 11.5a5.5 5.5 0 0 0 11 0" />
                <path d="M12 17v3" />
                <path d="M9 20h6" />
              </svg>
              <span>点击开始语音</span>
            </button>
            <div class="quick-prompts" id="quickPrompts"></div>
            <div class="search-hint" id="searchHint">💡 提示：您可以试着输入“您当前所在位置附近有什么值得去的地方？”</div>
          </section>

          <section class="chat-panel" id="chatPanel" aria-live="polite">
            <button
              class="chat-panel-header"
              id="chatPanelToggle"
              type="button"
              aria-expanded="true"
              aria-controls="conversation"
              aria-label="收起聊天面板"
            >
              <span class="chat-panel-header-copy">
                <strong class="chat-panel-title">聊天记录</strong>
                <span class="chat-panel-hint" id="chatPanelHint">点击收起，把更多空间留给地图</span>
              </span>
              <span class="chat-panel-chevron" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="m7 10 5 5 5-5" />
                </svg>
              </span>
            </button>

            <section class="chat-stream">
              <section class="conversation" id="conversation" aria-live="polite"></section>
            </section>

            <footer class="chat-input" id="followupInputBar">
              <input id="inlineQuestion" type="text" placeholder="继续提问..." />
              <button class="inspire-fab inspire-fab-inline" id="inlineInspireButton" type="button" aria-label="获取提问灵感" title="获取提问灵感" data-target="inlineQuestion">
                <svg class="inspire-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 3 13.9 8.1 19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9Z" />
                  <path d="M18 3 18.8 5.2 21 6l-2.2.8L18 9l-.8-2.2L15 6l2.2-.8Z" />
                </svg>
              </button>
              <button class="voice-fab voice-fab-inline" id="inlineVoiceButton" type="button" aria-label="语音输入" title="语音输入" data-target="inlineQuestion" hidden>
                <svg class="voice-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 15a3.5 3.5 0 0 0 3.5-3.5v-4a3.5 3.5 0 1 0-7 0v4A3.5 3.5 0 0 0 12 15Z" />
                  <path d="M6.5 11.5a5.5 5.5 0 0 0 11 0" />
                  <path d="M12 17v3" />
                  <path d="M9 20h6" />
                </svg>
              </button>
              <button id="inlineSend" type="button">➤</button>
              <button class="mobile-voice-cta mobile-voice-cta-inline" id="mobileInlineVoiceButton" type="button" aria-label="点击开始语音" title="点击开始语音" data-target="inlineQuestion" hidden>
                <svg class="voice-icon mobile-voice-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 15a3.5 3.5 0 0 0 3.5-3.5v-4a3.5 3.5 0 1 0-7 0v4A3.5 3.5 0 0 0 12 15Z" />
                  <path d="M6.5 11.5a5.5 5.5 0 0 0 11 0" />
                  <path d="M12 17v3" />
                  <path d="M9 20h6" />
                </svg>
                <span>点击开始语音</span>
              </button>
            </footer>
          </section>
        </div>
      </section>

      <section class="right-map-container map-column">
        <div class="map-toolbar"></div>
        <section class="map-wrap">
          <div id="map" class="map"></div>
          <div class="scale-chip">200 m</div>
        </section>
        <section class="evidence-table" id="evidenceDrawer">
          <button
            class="drawer-handle"
            id="evidenceDrawerToggle"
            type="button"
            aria-expanded="false"
            aria-controls="evidence"
            aria-label="展开附近结果列表"
          >
            <span class="drawer-grabber" aria-hidden="true"></span>
            <span class="drawer-handle-text">附近结果</span>
          </button>
          <header class="table-header">
            <h2 id="mapTitle">📍 我的周边</h2>
            <div class="table-tabs"><span>距离</span><span>评分</span><span>来源</span></div>
          </header>
          <div id="evidence" class="evidence-list">
            <p class="empty">定位后会自动展示您真实附近的商铺或地标。</p>
          </div>
          <button class="more-button" type="button">查看更多</button>
        </section>
      </section>

      <section class="favorites-panel" id="favoritesPanel" aria-hidden="true">
        <header class="favorites-panel-header">
          <div>
            <p class="favorites-panel-eyebrow">Saved Places</p>
            <h2>我的收藏</h2>
          </div>
          <span class="favorites-panel-count" id="favoritesCount">0 个地点</span>
        </header>
        <div class="favorites-panel-body" id="favoritesList"></div>
      </section>

      <section class="search-panel" id="searchPanel" aria-hidden="true">
        <header class="search-panel-header">
          <div>
            <p class="search-panel-eyebrow">Quick Collect</p>
            <h2>搜索地点</h2>
          </div>
          <span class="search-panel-count" id="searchResultCount">输入关键词开始搜索</span>
        </header>
        <form class="search-panel-form" id="searchPanelForm">
          <input id="searchPanelInput" type="search" placeholder="搜索停车场、大厦、咖啡馆、地标..." autocomplete="off" />
        </form>
        <div class="search-panel-body" id="searchPanelResults"></div>
      </section>
    </main>

    <nav class="mobile-bottom-nav" aria-label="移动端主导航">
      <button class="mobile-nav-item is-active" id="mobileConversationTab" type="button" aria-current="page" data-view="chat">
        <svg class="mobile-nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 8h10" />
          <path d="M7 12h6" />
          <path d="M7 16h4" />
          <path d="M17 17.5 20.5 21" />
          <circle cx="16" cy="14.5" r="3.5" />
        </svg>
        <span>对话</span>
      </button>
      <button class="mobile-nav-item" id="mobileFavoritesTab" type="button" title="收藏" data-view="favorites">
        <svg class="mobile-nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="m12 4 2.3 4.7 5.2.8-3.8 3.7.9 5.1L12 16l-4.6 2.3.9-5.1-3.8-3.7 5.2-.8Z" />
        </svg>
        <span>收藏</span>
      </button>
      <button class="mobile-nav-item" id="mobileSearchTab" type="button" title="搜索" data-view="search">
        <svg class="mobile-nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="5.5" />
          <path d="M16 16 20 20" />
        </svg>
        <span>搜索</span>
      </button>
      <button class="mobile-nav-item" type="button" title="设置">
        <svg class="mobile-nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Z" />
          <path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.5-2.4 1a7.8 7.8 0 0 0-2-.9l-.3-2.5h-4l-.3 2.5a7.8 7.8 0 0 0-2 .9l-2.4-1-2 3.5 2 1.5A7 7 0 0 0 5 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.5 2.4-1c.6.4 1.3.7 2 .9l.3 2.5h4l.3-2.5c.7-.2 1.4-.5 2-.9l2.4 1 2-3.5-2-1.5c.1-.4.1-.8.1-1.2Z" />
        </svg>
        <span>设置</span>
      </button>
    </nav>

    <div class="note-sheet-backdrop" id="favoriteNoteSheet" hidden>
      <div class="note-sheet-panel" role="dialog" aria-modal="true" aria-labelledby="favoriteNoteTitle">
        <div class="note-sheet-grabber" aria-hidden="true"></div>
        <div class="note-sheet-head">
          <div>
            <p class="note-sheet-eyebrow">私人标签</p>
            <h3 id="favoriteNoteTitle">给这个地点加一句备注</h3>
          </div>
          <button class="note-sheet-close" id="favoriteNoteCancel" type="button" aria-label="关闭">×</button>
        </div>
        <p class="note-sheet-place" id="favoriteNotePlace"></p>
        <input id="favoriteNoteInput" type="text" maxlength="60" placeholder="例如：闲鱼有券 10元/小时 / 入口在侧门" />
        <div class="note-sheet-actions">
          <button class="note-sheet-skip" id="favoriteNoteSkip" type="button">跳过</button>
          <button class="note-sheet-save" id="favoriteNoteSave" type="button">保存收藏</button>
        </div>
      </div>
    </div>

    <script src="/app.js?v=20260630-keyboard" type="module"></script>
  </body>
</html>
